  enabled: false
  data_source: "Property maintenance management system"
  months: []

# ── A.6 Prospect Analysis — from CRM / leasing software ──────────────────────
prospect_analysis:
  enabled: false
  data_source: "CRM / leasing software export"

# ── B CAPEX — from CAPEX tracking spreadsheet ────────────────────────────────
capex:
  enabled: false
  data_source: "CAPEX tracking spreadsheet"
  interior: []
  exterior: []

# ── C.2 Budget vs Actual — from budget file ──────────────────────────────────
budget:
  enabled: false
  data_source: "Property budget spreadsheet / Yardi budget export"

# ── E.2 Concession Detail — from GL ──────────────────────────────────────────
concessions_detail:
  enabled: false
  data_source: "General ledger concession line items"
  items: []

# ── AWS Bedrock — LLM narrative generation ───────────────────────────────────
bedrock:
  profile: ""          # Leave blank to use AWS_PROFILE env var
  region: "us-east-1"
  model_id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  max_tokens: 600
  fallback_to_template: true
