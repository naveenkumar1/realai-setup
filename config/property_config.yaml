# ─────────────────────────────────────────────────────────────────────────────
# A.4 — Lease Analysis  (from lease management system — update monthly)
# ─────────────────────────────────────────────────────────────────────────────
lease_analysis:
  enabled: false   # Set true when lease export data is available
  data_source: "Lease management system export"
  # When enabled, provide month-by-month data below
  months:
    - label: "December"
      expiration: 10
      renewal: 10
      pipeline_30: 6
      pipeline_60: 13
    - label: "November"
      expiration: 6
      renewal: 6
      pipeline_30: 12
      pipeline_60: 6
    - label: "October"
      expiration: 8
      renewal: 8
      pipeline_30: 10
      pipeline_60: 9

# ─────────────────────────────────────────────────────────────────────────────
# A.5 — Work Order Analysis  (from maintenance system — update monthly)
# ─────────────────────────────────────────────────────────────────────────────
work_orders:
  enabled: false   # Set true when maintenance data is available
  data_source: "Property maintenance management system"
  months:
    - label: "December"
      completed: 60
      pending: 5
    - label: "November"
      completed: 34
      pending: 17
    - label: "October"
      completed: 45
      pending: 8

# ─────────────────────────────────────────────────────────────────────────────
# A.6 — Prospect Analysis  (from CRM/leasing software — update monthly)
# ─────────────────────────────────────────────────────────────────────────────
prospect_analysis:
  enabled: false   # Set true when CRM data is available
  data_source: "CRM / leasing software export"
  new_contacts: 0
  walkins: 0
  primary_lead_source: ""
  primary_lead_source_pct: 0
  applications_submitted: 0
  leases_signed: 0
  top_unit_interest: ""

# ─────────────────────────────────────────────────────────────────────────────
# B — CAPEX  (from CAPEX tracking spreadsheet — update monthly)
# ─────────────────────────────────────────────────────────────────────────────
capex:
  enabled: false   # Set true when CAPEX data is available
  data_source: "CAPEX tracking spreadsheet"
  interior:
    - description: ""
      amount: 0.0
  exterior:
    - description: ""
      amount: 0.0

# ─────────────────────────────────────────────────────────────────────────────
# C.2 — Budget vs Actual  (from budget file — update monthly)
# ─────────────────────────────────────────────────────────────────────────────
budget:
  enabled: false   # Set true when budget file is available
  data_source: "Property budget spreadsheet / Yardi budget export"

# ─────────────────────────────────────────────────────────────────────────────
# E.2 — Concession Detail  (from GL or rent roll concession ledger)
# ─────────────────────────────────────────────────────────────────────────────
concessions_detail:
  enabled: false   # Set true when GL concession detail is available
  data_source: "General ledger concession line items"
  items:
    - unit: ""
      tenant: ""
      description: ""
      amount: 0.0

# ─────────────────────────────────────────────────────────────────────────────
# AWS / Bedrock settings for LLM narrative generation
# ─────────────────────────────────────────────────────────────────────────────
bedrock:
  profile: ""          # Leave blank to use AWS_PROFILE env var, or "default"
  region: "us-east-1"
  model_id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  max_tokens: 600
  fallback_to_template: true  # If Bedrock unavailable, use template narratives
